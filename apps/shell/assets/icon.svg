<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <title>Casual Office</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#1d4ed8"/>
      <stop offset="55%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#1e7a4f"/>
    </linearGradient>
    <linearGradient id="cardA" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#eef2ff"/>
    </linearGradient>
    <linearGradient id="cardB" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#ecfdf5"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
  </defs>

  <!-- Rounded-square base -->
  <rect x="64" y="64" width="896" height="896" rx="208" ry="208" fill="url(#bg)"/>

  <!-- Soft inner highlight -->
  <ellipse cx="320" cy="280" rx="380" ry="160" fill="#ffffff" opacity="0.10" filter="url(#soft)"/>

  <!-- Card B (sheet — slightly behind, tilted right) -->
  <g transform="translate(560 360) rotate(10) translate(-220 -270)">
    <rect x="0" y="0" width="440" height="540" rx="36" fill="url(#cardB)" opacity="0.95"/>
    <!-- grid lines hinting at a spreadsheet -->
    <g stroke="#1e7a4f" stroke-opacity="0.35" stroke-width="6" stroke-linecap="round">
      <line x1="60"  y1="160" x2="380" y2="160"/>
      <line x1="60"  y1="230" x2="380" y2="230"/>
      <line x1="60"  y1="300" x2="380" y2="300"/>
      <line x1="60"  y1="370" x2="380" y2="370"/>
      <line x1="160" y1="120" x2="160" y2="440"/>
      <line x1="280" y1="120" x2="280" y2="440"/>
    </g>
  </g>

  <!-- Card A (document — in front, tilted left) -->
  <g transform="translate(460 540) rotate(-8) translate(-220 -270)">
    <rect x="0" y="0" width="440" height="540" rx="36" fill="url(#cardA)"/>
    <!-- text lines hinting at a document -->
    <g fill="#1d4ed8" opacity="0.75">
      <rect x="60"  y="120" width="320" height="22" rx="11"/>
      <rect x="60"  y="180" width="260" height="22" rx="11"/>
      <rect x="60"  y="240" width="300" height="22" rx="11"/>
      <rect x="60"  y="300" width="220" height="22" rx="11"/>
      <rect x="60"  y="360" width="280" height="22" rx="11"/>
    </g>
    <!-- accent stripe at top -->
    <rect x="60" y="60" width="120" height="22" rx="11" fill="#2563eb"/>
  </g>
</svg>
